name: Build Main Resume
on:
  push:
    branches:
      - main
    paths:
      - main.tex
      - .github/workflows/main.yml
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build_latex:
    runs-on: ubuntu-latest
    env:
      GDRIVE_SA_KEY: ${{ secrets.GDRIVE_SA_KEY }}
      GDRIVE_FILE_ID: ${{ secrets.GDRIVE_FILE_ID }}
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
      - name: Upload PDF file
        uses: actions/upload-artifact@v4
        with:
          name: PDF
          path: main.pdf
          retention-days: 30
      - name: Upload new version of resume to Google Drive
        if: env.GDRIVE_SA_KEY != '' && env.GDRIVE_FILE_ID != ''
        run: |
          pip install --quiet google-auth
          TOKEN=$(python3 - <<'EOF'
          import json, os
          from google.oauth2 import service_account
          from google.auth.transport.requests import Request
          creds = service_account.Credentials.from_service_account_info(
              json.loads(os.environ["GDRIVE_SA_KEY"]),
              scopes=["https://www.googleapis.com/auth/drive"],
          )
          creds.refresh(Request())
          print(creds.token)
          EOF
          )
          curl --fail-with-body -sS -X PATCH \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/pdf" \
            --data-binary @main.pdf \
            "https://www.googleapis.com/upload/drive/v3/files/${GDRIVE_FILE_ID}?uploadType=media&supportsAllDrives=true"
